services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: websiteuptest
      POSTGRES_PASSWORD: websiteuptest
      POSTGRES_DB: websiteuptest
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U websiteuptest"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://websiteuptest:websiteuptest@q12qg764fvcmqbuknk1gslla:5432/websiteuptest
      PORT: "8080"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  db_data:
